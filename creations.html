<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Story - NONGOVMEDIA</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Metropolis Font Family Declarations */
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-Thin.otf') format('opentype');
            font-weight: 100;
            font-style: normal;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-Light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-Medium.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-SemiBold.otf') format('opentype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-ExtraBold.otf') format('opentype');
            font-weight: 800;
            font-style: normal;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-Black.otf') format('opentype');
            font-weight: 900;
            font-style: normal;
        }

        /* Italic versions */
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-ThinItalic.otf') format('opentype');
            font-weight: 100;
            font-style: italic;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-LightItalic.otf') format('opentype');
            font-weight: 300;
            font-style: italic;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-RegularItalic.otf') format('opentype');
            font-weight: 400;
            font-style: italic;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-MediumItalic.otf') format('opentype');
            font-weight: 500;
            font-style: italic;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-SemiBoldItalic.otf') format('opentype');
            font-weight: 600;
            font-style: italic;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-BoldItalic.otf') format('opentype');
            font-weight: 700;
            font-style: italic;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-ExtraBoldItalic.otf') format('opentype');
            font-weight: 800;
            font-style: italic;
        }
        @font-face {
            font-family: 'Metropolis';
            src: url('./Font/Metropolis-BlackItalic.otf') format('opentype');
            font-weight: 900;
            font-style: italic;
        }

        .social-icon {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            transform: translateY(-2px);
        }

        html, body {
            font-family: 'Metropolis', sans-serif;
            background: #ffffff;
            color: #000000;
            height: 100%; 
            /* Fixed body to ensure wheel event translates only to horizontal */
            overflow: hidden; 
            margin: 0;
        }
        
        .glass-morphism {
            background: rgba(169, 172, 230, 0.38);
            border-radius: 0px;
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(169, 172, 230, 0.3);
        }
        
        /* --- CORE GALLERY CONTAINER --- */
        .horizontal-image-gallery {
            display: flex;
            overflow-x: auto; 
            overflow-y: hidden; 
            -webkit-overflow-scrolling: touch; 
            gap: 1.5rem;
            height: 100vh;
            align-items: center;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; 
            -ms-overflow-style: none;  
            padding: 0 4rem;
        }

        .horizontal-image-gallery::-webkit-scrollbar {
            display: none; 
        }

        .gallery-item {
            flex-shrink: 0; 
            width: 80vw;
            height: 80vh;
            border-radius: 0px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            overflow: hidden; 
            background-color: #ffffff; 
            scroll-snap-align: center;
        }

        .gallery-item.text-only {
            width: 60vw;
            height: auto;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .gallery-item.image-only img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block; 
        }

        .text-content-wrapper {
            padding: 3rem;
            overflow-y: auto;
        }

        /* Desktop Layout Fixes */
        @media (min-width: 1024px) {
            .page-container {
                display: grid;
                grid-template-columns: 240px 1fr;
                height: 100vh;
            }
            .sidebar {
                width: 240px;
                position: fixed;
                height: 100vh;
            }
            .main-content {
                margin-left: 240px;
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 1023px) {
            html, body { overflow: auto; }
            .horizontal-image-gallery {
                flex-direction: column;
                height: auto;
                padding: 2rem 1rem;
                overflow-y: visible;
                scroll-snap-type: none;
            }
            .gallery-item {
                width: 100%;
                height: auto;
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <header class="sidebar p-8 flex flex-col justify-between glass-morphism z-50">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-[#020633] mb-12">
                    NONGOVMEDIA
                </h1>
                <nav class="space-y-4 hidden lg:block">
                    <a href="index.html" class="block text-gray-500 hover:text-black">Home</a>
                    <a href="projects.html" class="block font-bold">Projects</a>
                    <a href="reviews.html" class="block text-gray-500 hover:text-black">Reviews</a>
                    <a href="about.html" class="block text-gray-500 hover:text-black">About</a>
                    <a href="contact.html" class="block text-gray-500 hover:text-black">Contact</a>
                </nav>
            </div>
            
            <footer class="hidden lg:block">
                <div class="flex space-x-4 mb-4">
                    <a href="https://youtube.com/@nongovmedia" target="_blank"><img src="./YT.svg" alt="YT" class="social-icon"></a>
                    <a href="https://instagram.com/nongov_kelvin/" target="_blank"><img src="./IG.svg" alt="IG" class="social-icon"></a>
                    <a href="https://x.com/nongovkelvin" target="_blank"><img src="./x.svg" alt="X" class="social-icon"></a>
                </div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">© 2026 All rights reserved.</p>
            </footer>
        </header>

        <main class="main-content">
            <div class="horizontal-image-gallery" id="horizontal-gallery">
                <div class="gallery-item text-only">
                    <div class="text-content-wrapper">
                        <h2 class="text-5xl font-black mb-6">Creation Story</h2>
                        <p class="text-gray-600 leading-relaxed text-lg">
                            An exploration of beginning, form, and the void. This series captures the raw essence of construction and the beauty of things coming into being.
                        </p>
                    </div>
                </div>

                <div class="gallery-item image-only">
                    <img src="images/Creation/img1.jpg" alt="Creation 1" onerror="this.src='https://placehold.co/1200x800?text=Creation+1'">
                </div>

                <div class="gallery-item image-only">
                    <img src="images/Creation/img2.jpg" alt="Creation 2" onerror="this.src='https://placehold.co/1200x800?text=Creation+2'">
                </div>

                <div class="gallery-item image-only">
                    <img src="images/Creation/img3.jpg" alt="Creation 3" onerror="this.src='https://placehold.co/1200x800?text=Creation+3'">
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gallery = document.getElementById('horizontal-gallery');

            // Listen to the wheel event on the whole window
            window.addEventListener('wheel', (evt) => {
                // Only apply horizontal redirection on desktop screens
                if (window.innerWidth >= 1024) {
                    // Prevent default vertical scroll behavior
                    evt.preventDefault();
                    
                    // Translate vertical scroll delta (deltaY) to horizontal scroll position
                    gallery.scrollBy({
                        left: evt.deltaY,
                        behavior: 'auto' // Instant response to wheel movement
                    });
                }
            }, { passive: false });
        });
    </script>
</body>
</html>
