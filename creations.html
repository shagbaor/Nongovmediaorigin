        .social-icon {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            transform: translateY(-2px);
        }

        html, body {
            font-family: 'Metropolis', sans-serif;
            background: #ffffff;
            color: #000000;
            height: 100%; 
            /* Prevent body from scrolling vertically on desktop to keep sidebar fixed */
            overflow: hidden; 
        }
        
        .glass-morphism {
            background: rgba(169, 172, 230, 0.38);
            border-radius: 0px;
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(169, 172, 230, 0.3);
        }
        
        /* --- CORE GALLERY CONTAINER --- */
        .horizontal-image-gallery {
            display: flex;
            overflow-x: auto; 
            overflow-y: hidden; 
            -webkit-overflow-scrolling: touch; 
            gap: 1.5rem;
            height: 100vh;
            align-items: center;
            
            /* FIXED: Scroll Snapping for smooth stopping */
            scroll-snap-type: x mandatory;
            
            scrollbar-width: none; 
            -ms-overflow-style: none;  
            padding: 0 4rem;
        }

        .horizontal-image-gallery::-webkit-scrollbar {
            display: none; 
        }

        .gallery-item {
            flex-shrink: 0; 
            width: 80vw;
            height: 80vh;
            border-radius: 0px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            overflow: hidden; 
            background-color: #ffffff; 
            /* Snap alignment */
            scroll-snap-align: center;
        }

        .gallery-item.text-only {
            width: 60vw;
            height: auto;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .gallery-item.image-only img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block; 
        }

        .text-content-wrapper {
            padding: 3rem;
            overflow-y: auto;
        }
